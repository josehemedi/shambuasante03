name: Deploy Frontend to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            echo "--- Début du déploiement du Frontend ---"
            cd /home/github-deployer/apps/frontend-hopital

            git pull origin main

            # Réseau partagé avec le stack backend (docker compose name: shambua-sante)
            docker network inspect shambua-sante_shambua-net >/dev/null 2>&1 \
              || docker network create shambua-sante_shambua-net

            export BACKEND_UPSTREAM="${BACKEND_UPSTREAM:-backend:8082}"

            docker compose up -d --build --force-recreate frontend

            # Vérifier que nginx répond
            sleep 3
            docker compose ps frontend
            curl -fsS -o /dev/null -w "HTTP %{http_code}\n" http://127.0.0.1:8080/ || true

            docker image prune -f

            echo "--- Déploiement du Frontend terminé avec succès ! ---"
