# Frontend Shambua Santé — production (nginx)
# Sur le VPS, le frontend rejoint le réseau Docker du backend (shambua-sante_shambua-net)
# et proxifie /api + /ws vers le service "backend:8082".
#
# Usage :
#   docker compose up -d --build
#   → http://localhost:8080
#
# Prérequis VPS : le stack backend doit déjà créer le réseau
#   shambua-sante_shambua-net (docker compose name: shambua-sante).

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_WS_URL: ${VITE_WS_URL:-}
        VITE_USE_LIVE_API: ${VITE_USE_LIVE_API:-true}
    image: shambua-sante-ui:latest
    container_name: shambua-frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    environment:
      # Service Docker du backend (compose Hospicloud) sur le réseau partagé
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM:-backend:8082}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - shambua-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  shambua-net:
    external: true
    name: shambua-sante_shambua-net
