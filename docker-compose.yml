# Frontend Shambua Santé — production (nginx)
# Backend attendu sur BACKEND_UPSTREAM (défaut : host.docker.internal:8082)
#
# Usage :
#   docker compose up -d --build
#   → http://localhost:8080

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_WS_URL: ${VITE_WS_URL:-}
        VITE_USE_LIVE_API: ${VITE_USE_LIVE_API:-true}
    image: shambua-sante-ui:latest
    container_name: shambua-frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    environment:
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM:-host.docker.internal:8082}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # --- ON AJOUTE CETTE SECTION POUR CONNECTER LE RÉSEAU ---
    networks:
      - shambua-net
    restart: unless-stopped

# --- ON AJOUTE CETTE SECTION TOUT EN BAS DU FICHIER ---
networks:
  shambua-net:
    external: true
    name: shambua-sante_shambua-net
